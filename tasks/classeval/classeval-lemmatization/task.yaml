name: classeval-lemmatization
language: python
difficulty: hard
timeout_sec: 300
docker_image: agentcode-classeval

instruction: |
  Implement the `Lemmatization` class in `src/lemmatization.py`.
  
  This is a class about Lemmatization, which utilizes the nltk library to perform lemmatization and part-of-speech tagging on sentences, as well as remove punctuation.
  
  The class skeleton with all method signatures and docstrings is already in place.

grader_weights:
  public: 0.3
  private: 0.6
  lint: 0.1
