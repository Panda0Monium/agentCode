name: classeval-binary-data-processor
language: python
difficulty: easy
timeout_sec: 300
docker_image: agentcode-base

instruction: |
  Implement the `BinaryDataProcessor` class in `src/binary_data_processor.py`.
  
  This is a class used to process binary data, which includes functions such as clearing non 0 or 1 characters, counting binary string information, and converting to corresponding strings based on different encoding methods.
  
  The class skeleton with all method signatures and docstrings is already in place.

grader_weights:
  public: 0.3
  private: 0.6
  lint: 0.1
