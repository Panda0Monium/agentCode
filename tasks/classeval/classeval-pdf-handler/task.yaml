name: classeval-pdf-handler
language: python
difficulty: medium
timeout_sec: 300
docker_image: agentcode-classeval

instruction: |
  Implement the `PDFHandler` class in `src/pdf_handler.py`.
  
  The class allows merging multiple PDF files into one and extracting text from PDFs using PyPDF2 library.
  
  The class skeleton with all method signatures and docstrings is already in place.

grader_weights:
  public: 0.3
  private: 0.6
  lint: 0.1
