name: classeval-eight-puzzle
language: python
difficulty: hard
timeout_sec: 300
docker_image: agentcode-base

instruction: |
  Implement the `EightPuzzle` class in `src/eight_puzzle.py`.
  
  This class is an implementation of the classic 8-puzzle game, including methods for finding the blank tile, making moves, getting possible moves, and solving the puzzle using a breadth-first search algorithm.
  
  The class skeleton with all method signatures and docstrings is already in place.

grader_weights:
  public: 0.3
  private: 0.6
  lint: 0.1
