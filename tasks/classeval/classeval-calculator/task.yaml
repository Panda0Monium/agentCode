name: classeval-calculator
language: python
difficulty: hard
timeout_sec: 300
docker_image: agentcode-base

instruction: |
  Implement the `Calculator` class in `src/calculator.py`.
  
  This is a class for a calculator, capable of performing basic arithmetic calculations on numerical expressions using the operators +, -, *, /, and ^ (exponentiation).
  
  The class skeleton with all method signatures and docstrings is already in place.

grader_weights:
  public: 0.3
  private: 0.6
  lint: 0.1
