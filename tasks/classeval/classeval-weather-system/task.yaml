name: classeval-weather-system
language: python
difficulty: hard
timeout_sec: 300
docker_image: agentcode-base

instruction: |
  Implement the `WeatherSystem` class in `src/weather_system.py`.
  
  This is a class representing a weather system that provides functionality to query weather information for a specific city and convert temperature units between Celsius and Fahrenheit.
  
  The class skeleton with all method signatures and docstrings is already in place.

grader_weights:
  public: 0.3
  private: 0.6
  lint: 0.1
