name: classeval-decryption-utils
language: python
difficulty: easy
timeout_sec: 300
docker_image: agentcode-base

instruction: |
  Implement the `DecryptionUtils` class in `src/decryption_utils.py`.
  
  This is a class that provides methods for decryption, including the Caesar cipher, Vigenere cipher, and Rail Fence cipher.
  
  The class skeleton with all method signatures and docstrings is already in place.

grader_weights:
  public: 0.3
  private: 0.6
  lint: 0.1
