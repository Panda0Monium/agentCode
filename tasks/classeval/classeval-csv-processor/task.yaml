name: classeval-csv-processor
language: python
difficulty: hard
timeout_sec: 300
docker_image: agentcode-base

instruction: |
  Implement the `CSVProcessor` class in `src/csv_processor.py`.
  
  This is a class for processing CSV files, including readring and writing CSV data, as well as processing specific operations and saving as a new CSV file.
  
  The class skeleton with all method signatures and docstrings is already in place.

grader_weights:
  public: 0.3
  private: 0.6
  lint: 0.1
