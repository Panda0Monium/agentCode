name: classeval-class-registration-system
language: python
difficulty: easy
timeout_sec: 300
docker_image: agentcode-base

instruction: |
  Implement the `ClassRegistrationSystem` class in `src/class_registration_system.py`.
  
  This is a class as a class registration system, allowing to register students, register them for classes, retrieve students by major, get a list of all majors, and determine the most popular class within a specific major.
  
  The class skeleton with all method signatures and docstrings is already in place.

grader_weights:
  public: 0.3
  private: 0.6
  lint: 0.1
