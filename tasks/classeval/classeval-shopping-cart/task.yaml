name: classeval-shopping-cart
language: python
difficulty: easy
timeout_sec: 300
docker_image: agentcode-base

instruction: |
  Implement the `ShoppingCart` class in `src/shopping_cart.py`.
  
  The class manages items, their prices, quantities, and allows to for add, removie, view items, and calculate the total price.
  
  The class skeleton with all method signatures and docstrings is already in place.

grader_weights:
  public: 0.3
  private: 0.6
  lint: 0.1
