name: classeval-classroom
language: python
difficulty: medium
timeout_sec: 300
docker_image: agentcode-base

instruction: |
  Implement the `Classroom` class in `src/classroom.py`.
  
  This is a class representing a classroom, capable of adding and removing courses, checking availability at a given time, and detecting conflicts when scheduling new courses.
  
  The class skeleton with all method signatures and docstrings is already in place.

grader_weights:
  public: 0.3
  private: 0.6
  lint: 0.1
