<!DOCTYPE html>
<html lang="en" data-theme="{{ theme }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentCode{% block title_suffix %}{% endblock %}</title>

  <!-- Sync .dark class from data-theme before render (no flash) -->
  <script>
    if (document.documentElement.dataset.theme === 'dark') {
      document.documentElement.classList.add('dark');
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ════════════════════════════════════════════════════════════
       THEMES
       Each block defines all colors for that theme in one place.
       Add new themes by copying a block and changing the values.
    ════════════════════════════════════════════════════════════ */

    [data-theme="light"] {
      --accent:          #3b82f6;   /* primary buttons, links, active states */
      --accent-hover:    #2563eb;
      --accent-light:    #eff6ff;   /* badge / chip background */
      --accent-text:     #1d4ed8;   /* text on accent-light bg */
      --secondary:       #f59e0b;   /* sign-up button */
      --secondary-hover: #d97706;
    }

    [data-theme="dark"] {
      --accent:          #60a5fa;   /* lighter blue reads better on dark */
      --accent-hover:    #93c5fd;
      --accent-light:    #172554;   /* dark tint for badges */
      --accent-text:     #93c5fd;
      --secondary:       #fbbf24;
      --secondary-hover: #f59e0b;
    }

    /* ── Propagate accent to every blue Tailwind class the app uses ── */
    .bg-blue-600, .bg-blue-500, .bg-blue-400 { background-color: var(--accent)       !important; }
    .hover\:bg-blue-700:hover                 { background-color: var(--accent-hover) !important; }
    .text-blue-600, .text-blue-400,
    .dark\:text-blue-400                      { color: var(--accent)                  !important; }
    .border-blue-600, .dark\:border-blue-400  { border-color: var(--accent)           !important; }
    .bg-blue-100, .dark\:bg-blue-900\/40      { background-color: var(--accent-light) !important; }
    .text-blue-700, .dark\:text-blue-300      { color: var(--accent-text)             !important; }
    .focus\:ring-blue-500:focus               { --tw-ring-color: var(--accent); }

    /* ── Secondary ── */
    .bg-amber-500                        { background-color: var(--secondary)       !important; }
    .hover\:bg-amber-600:hover           { background-color: var(--secondary-hover) !important; }
  </style>
</head>

<body class="min-h-screen bg-gray-50 text-gray-900 font-sans dark:bg-gray-950 dark:text-gray-100">

  <nav class="bg-white border-b border-gray-200 dark:bg-gray-900 dark:border-gray-800">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">

      <a href="/" class="flex items-center gap-2 text-xl font-bold tracking-tight
                          text-gray-900 dark:text-white hover:opacity-80 transition-opacity">
        <svg class="w-7 h-7 text-blue-600" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C9.8 2 8 3.8 8 6v1H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0
                   2-2V9a2 2 0 0 0-2-2h-2V6c0-2.2-1.8-4-4-4zm0 2c1.1 0 2 .9 2 2v1h-4V6c0-1.1
                   .9-2 2-2zm-2 9a2 2 0 1 1 4 0 2 2 0 0 1-4 0zm-1 0a3 3 0 1 0 6 0 3 3 0 0 0-6 0z"/>
        </svg>
        <span>Agent<span class="text-blue-600">Code</span></span>
      </a>

      <div class="flex items-center gap-3">
        {% if user.is_authenticated %}
          <a href="{% url 'run_history' %}"
             class="text-sm text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition-colors">My Runs</a>
          <a href="{% url 'model_config' %}"
             class="text-sm text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition-colors">Settings</a>
          <span class="text-sm text-gray-400 dark:text-gray-500">{{ user.email }}</span>
          <a href="{% url 'account_logout' %}"
             class="text-sm text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition-colors">Sign Out</a>
        {% else %}
          <a href="{% url 'account_login' %}"
             class="text-sm text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition-colors">Sign In</a>
          <a href="{% url 'account_signup' %}"
             class="text-sm px-4 py-1.5 rounded-md bg-amber-500 text-white font-medium
                    hover:bg-amber-600 transition-colors">Sign Up</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
