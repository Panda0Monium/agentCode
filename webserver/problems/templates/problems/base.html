<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentCode{% block title_suffix %}{% endblock %}</title>

  <script>tailwind.config = { darkMode: 'class' };</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Apply saved theme before body renders to prevent flash -->
  <script>
    (function () {
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body class="min-h-screen bg-gray-50 text-gray-900 font-sans transition-colors duration-200
             dark:bg-gray-950 dark:text-gray-100">

  <nav class="bg-white border-b border-gray-200 dark:bg-gray-900 dark:border-gray-800">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">

      <a href="/" class="flex items-center gap-2 text-xl font-bold tracking-tight
                          text-gray-900 dark:text-white hover:opacity-80 transition-opacity">
        <svg class="w-7 h-7 text-blue-600" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C9.8 2 8 3.8 8 6v1H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0
                   2-2V9a2 2 0 0 0-2-2h-2V6c0-2.2-1.8-4-4-4zm0 2c1.1 0 2 .9 2 2v1h-4V6c0-1.1
                   .9-2 2-2zm-2 9a2 2 0 1 1 4 0 2 2 0 0 1-4 0zm-1 0a3 3 0 1 0 6 0 3 3 0 0 0-6 0z"/>
        </svg>
        <span>Agent<span class="text-blue-600">Code</span></span>
      </a>

      <div class="flex items-center gap-3">
        <button id="theme-toggle" aria-label="Toggle theme"
                class="p-2 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-100
                       dark:hover:text-gray-200 dark:hover:bg-gray-800 transition-colors">
          <svg id="icon-moon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M20.354 15.354A9 9 0 0 1 8.646 3.646 9.003 9.003 0 0 0 12 21a9.003 9.003 0 0 0 8.354-5.646z"/>
          </svg>
          <svg id="icon-sun" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707
                     M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>
          </svg>
        </button>

        {% if user.is_authenticated %}
          <a href="{% url 'run_history' %}"
             class="text-sm text-gray-600 hover:text-gray-900 dark:text-gray-400
                    dark:hover:text-white transition-colors">My Runs</a>
          <a href="{% url 'model_config' %}"
             class="text-sm text-gray-600 hover:text-gray-900 dark:text-gray-400
                    dark:hover:text-white transition-colors">Settings</a>
          <span class="text-sm text-gray-400 dark:text-gray-500">{{ user.email }}</span>
          <a href="{% url 'account_logout' %}"
             class="text-sm text-gray-600 hover:text-gray-900 dark:text-gray-400
                    dark:hover:text-white transition-colors">Sign Out</a>
        {% else %}
          <a href="{% url 'account_login' %}"
             class="text-sm text-gray-600 hover:text-gray-900 dark:text-gray-400
                    dark:hover:text-white transition-colors">Sign In</a>
          <a href="{% url 'account_signup' %}"
             class="text-sm px-4 py-1.5 rounded-md bg-amber-500 text-white font-medium
                    hover:bg-amber-600 transition-colors">Sign Up</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', function () {
      var html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    });
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
