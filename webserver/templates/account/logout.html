{% extends "problems/base.html" %}
{% block title_suffix %} — Sign Out{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 text-center">
  <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-4">Sign Out</h1>
  <p class="text-gray-500 dark:text-gray-400 mb-6">Are you sure you want to sign out?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit"
            class="px-6 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium
                   hover:bg-blue-700 transition-colors">
      Yes, sign out
    </button>
  </form>
</div>
{% endblock %}
